<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>胡氏清念宗祠重光庆典交通规划系统</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

.header {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  padding: 8px 20px;
  display: flex; align-items: center; justify-content: center;
  border-bottom: 2px solid #e94560;
  flex-shrink: 0; position: relative;
}
.header h1 {
  color: #f0e6d3; font-size: 18px; font-weight: 600; letter-spacing: 4px;
  text-shadow: 0 0 10px rgba(233,69,96,0.3);
  flex: 1; text-align: center;
}
.header-info { color: #8899aa; font-size: 11px; position: absolute; right: 20px; }

.main { flex: 1; display: flex; overflow: hidden; }

.map-area { flex: 1; position: relative; }

/* 坐标显示条 */
.coord-bar {
  position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); z-index: 100;
  background: rgba(22,33,62,0.92); border-radius: 6px; padding: 4px 14px;
  color: #f0e6d3; font-size: 12px; font-family: monospace;
  border: 1px solid #0f3460; cursor: pointer; user-select: all;
  backdrop-filter: blur(4px);
}
.coord-bar:active { background: rgba(233,69,96,0.3); }

/* 弹窗输入 */
.popup-overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.5); align-items: center; justify-content: center;
}
.popup-box {
  background: #16213e; border: 1px solid #e94560; border-radius: 10px;
  padding: 20px; min-width: 260px;
}
.popup-box h3 { color: #f0e6d3; font-size: 14px; margin-bottom: 12px; }
.popup-box label { color: #8899aa; font-size: 11px; display: block; margin-bottom: 4px; margin-top: 8px; }
.popup-box input {
  background: #0f3460; border: 1px solid #1a4a8a; color: #f0e6d3;
  padding: 8px 10px; border-radius: 6px; font-size: 13px; width: 100%; outline: none;
}
.popup-box input:focus { border-color: #e94560; }
.popup-btns { display: flex; gap: 8px; margin-top: 14px; }
.popup-btns button {
  flex: 1; padding: 7px; border-radius: 6px; cursor: pointer; font-size: 12px; border: none;
}
.popup-btns .btn-ok { background: #e94560; color: #fff; }
.popup-btns .btn-ok:hover { background: #c73850; }
.popup-btns .btn-cancel { background: #0f3460; color: #8899aa; border: 1px solid #1a4a8a; }

/* 右侧面板 */
.sidebar {
  width: 240px; background: #16213e; border-left: 1px solid #0f3460;
  display: flex; flex-direction: column; overflow-y: auto; flex-shrink: 0;
}
.panel { padding: 10px 12px; border-bottom: 1px solid #0f3460; }
.panel-title {
  color: #8899aa; font-size: 11px; font-weight: 600;
  letter-spacing: 1px; margin-bottom: 8px;
  display: flex; align-items: center; justify-content: space-between;
}
.panel-title .badge {
  background: #e94560; color: #fff; font-size: 10px; padding: 1px 6px;
  border-radius: 8px; letter-spacing: 0;
}

.tool-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; }

.btn {
  background: #0f3460; color: #c0c8d4; border: 1px solid #1a4a8a;
  padding: 6px 4px; border-radius: 6px; cursor: pointer; font-size: 11px;
  transition: all 0.15s; display: flex; flex-direction: column;
  align-items: center; gap: 2px; white-space: nowrap;
}
.btn:hover { background: #1a4a8a; color: #fff; }
.btn.active { background: #e94560; border-color: #e94560; color: #fff; }
.btn svg { width: 16px; height: 16px; }

.ctrl-row { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
.ctrl-row:last-child { margin-bottom: 0; }
.ctrl-row label { color: #8899aa; font-size: 11px; min-width: 28px; flex-shrink: 0; }
input[type="color"] { width: 30px; height: 26px; border: 2px solid #1a4a8a; border-radius: 4px; cursor: pointer; background: none; padding: 0; flex-shrink: 0; }
input[type="range"] { flex: 1; }
.size-val { color: #e0e0e0; font-size: 11px; min-width: 20px; text-align: right; }

.action-btns { display: flex; flex-direction: column; gap: 4px; }
.action-btns .btn { flex-direction: row; justify-content: center; gap: 6px; padding: 8px; }

/* 停车场统计 */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 8px; }
.stat-card { background: #0f3460; border-radius: 6px; padding: 8px; text-align: center; }
.stat-card .stat-num { font-size: 22px; font-weight: 700; color: #f0e6d3; }
.stat-card .stat-label { font-size: 10px; color: #8899aa; margin-top: 2px; }

.progress-bar { height: 6px; background: #0f3460; border-radius: 3px; overflow: hidden; margin-top: 4px; }
.progress-bar .fill { height: 100%; border-radius: 3px; transition: width 0.3s; }

/* 停车场列表 */
.lot-list { max-height: 240px; overflow-y: auto; }
.lot-item {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 6px; border-radius: 4px; margin-bottom: 3px;
  background: rgba(15,52,96,0.5); font-size: 11px; color: #c0c8d4;
}
.lot-item .lot-color { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
.lot-item .lot-name { flex: 1; }
.lot-item .lot-cap { font-weight: 600; }
.lot-item .lot-cap.full { color: #f44336; }
.lot-item .lot-cap.ok { color: #4caf50; }
.lot-item .lot-del { color: #556; cursor: pointer; padding: 0 4px; font-size: 14px; line-height: 1; }
.lot-item .lot-del:hover { color: #f44336; }
.lot-btn {
  background: #0f3460; color: #88aacc; border: 1px solid #1a4a8a;
  width: 18px; height: 18px; border-radius: 3px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: bold; line-height: 1; user-select: none;
}
.lot-btn:hover { background: #1a4a8a; color: #fff; }
.lot-empty { color: #556; font-size: 11px; text-align: center; padding: 10px; }

.shortcuts { padding: 10px 12px; margin-top: auto; border-top: 1px solid #0f3460; }
.shortcut-list { color: #556677; font-size: 10px; line-height: 1.9; }
.shortcut-list kbd { background: #0f3460; color: #88aacc; padding: 1px 4px; border-radius: 3px; font-family: inherit; font-size: 10px; }

/* 登录遮罩 */
.login-mask {
  position: fixed; inset: 0; z-index: 999;
  background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center;
}
.login-box {
  background: #16213e; border: 1px solid #e94560; border-radius: 10px;
  padding: 24px 28px; text-align: center; min-width: 240px;
}
.login-box h2 { color: #f0e6d3; font-size: 15px; margin-bottom: 14px; letter-spacing: 1px; }
.login-box input {
  background: #0f3460; border: 1px solid #1a4a8a; color: #f0e6d3;
  padding: 8px 12px; border-radius: 6px; font-size: 14px; width: 100%;
  outline: none; text-align: center; letter-spacing: 4px;
}
.login-box input:focus { border-color: #e94560; }
.login-box button {
  margin-top: 12px; background: #e94560; color: #fff; border: none;
  padding: 8px 28px; border-radius: 6px; cursor: pointer; font-size: 13px;
}
.login-box button:hover { background: #c73850; }
.login-box .err { color: #f44336; font-size: 11px; margin-top: 8px; display: none; }
</style>
</head>
<body>

<div class="login-mask" id="loginMask">
  <div class="login-box">
    <h2>管理后台登录</h2>
    <input type="password" id="loginPwd" placeholder="请输入密码" autofocus>
    <div class="err" id="loginErr">密码错误，请重试</div>
    <button onclick="checkLogin()">进入系统</button>
  </div>
</div>

<div class="header">
  <h1>胡氏清念宗祠重光庆典交通规划系统</h1>
  <span class="header-info">预计宾客 1000+ · 车辆 150+ 台</span>
</div>

<div class="main">
  <div class="map-area">
    <div id="map" style="width:100%;height:100%;"></div>
    <div class="coord-bar" id="coordBar" title="点击复制坐标">移动鼠标获取坐标</div>
  </div>

  <!-- 弹窗输入 -->
  <div class="popup-overlay" id="popupOverlay">
    <div class="popup-box">
      <h3 id="popupTitle">添加停车场</h3>
      <div id="popupFields"></div>
      <div class="popup-btns">
        <button class="btn-cancel" onclick="closePopup()">取消</button>
        <button class="btn-ok" id="popupOk" onclick="confirmPopup()">确认</button>
      </div>
    </div>
  </div>

  <div class="sidebar">
    <!-- 工具 -->
    <div class="panel">
      <div class="panel-title">工具</div>
      <div class="tool-grid">
        <button class="btn" id="btnMove" onclick="setTool('move')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 9l-3 3 3 3"/><path d="M9 5l3-3 3 3"/><path d="M15 19l-3 3-3-3"/><path d="M19 9l3 3-3 3"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/></svg>
          移动
        </button>
        <button class="btn" id="btnText" onclick="setTool('text')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7V4h16v3"/><path d="M9 20h6"/><path d="M12 4v16"/></svg>
          文字
        </button>
        <button class="btn" id="btnArrow" onclick="setTool('arrow')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          箭头
        </button>
        <button class="btn active" id="btnParking" onclick="setTool('parking')" style="color:#4caf50;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><text x="12" y="17" text-anchor="middle" font-size="12" fill="currentColor" stroke="none" font-weight="bold">P</text></svg>
          停车场
        </button>
        <button class="btn" id="btnTraffic" onclick="setTool('traffic')" style="color:#ff9800;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="14 7 19 12 14 17"/></svg>
          导流线
        </button>
        <button class="btn" id="btnGuard" onclick="setTool('guard')" style="color:#00bcd4;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="3"/><path d="M12 8v5"/><path d="M9 11l3 2 3-2"/><path d="M10 21l2-8 2 8"/></svg>
          指挥员
        </button>
        <button class="btn" id="btnVillageExit" onclick="setTool('villageExit')" style="color:#ff7043;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 12h9"/>
            <path d="M10 7l4 5-4 5"/>
            <path d="M19 5v14"/>
          </svg>
          出村口
        </button>
        <button class="btn" id="btnVillageEntry" onclick="setTool('villageEntry')" style="color:#4caf50;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H10"/>
            <path d="M14 7l-4 5 4 5"/>
            <path d="M5 5v14"/>
          </svg>
          进村口
        </button>
        <button class="btn" id="btnEraser" onclick="setTool('eraser')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 20H7L3 16l9-9 8 8-4 4z"/></svg>
          删除
        </button>
      </div>
    </div>

    <!-- 属性 -->
    <div class="panel">
      <div class="panel-title">属性</div>
      <div class="ctrl-row">
        <label>颜色</label>
        <input type="color" id="colorPicker" value="#ff0000">
        <span class="size-val" id="colorHex">#ff0000</span>
      </div>
      <div class="ctrl-row" id="fontGroup" style="display:none;">
        <label>字号</label>
        <input type="range" id="fontSize" min="12" max="60" value="16">
        <span class="size-val" id="fontSizeVal">16</span>
      </div>
    </div>

    <!-- 停车场统计 -->
    <div class="panel" id="statsPanel">
      <div class="panel-title">停车场统计 <span class="badge" id="statsBadge">0/0</span></div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-num" id="totalSlots">0</div>
          <div class="stat-label">总车位</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="totalLots">0</div>
          <div class="stat-label">停车场数</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="totalParked" style="color:#ff9800;">0</div>
          <div class="stat-label">已停车辆</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="totalFree" style="color:#4caf50;">0</div>
          <div class="stat-label">剩余车位</div>
        </div>
      </div>
      <div class="progress-bar">
        <div class="fill" id="progressFill" style="width:0%; background:#e94560;"></div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:3px;">
        <span style="color:#556;font-size:10px;">目标 150 台</span>
        <span style="font-size:10px;" id="progressText">0%</span>
      </div>
    </div>

    <!-- 停车场列表 -->
    <div class="panel">
      <div class="panel-title">停车场列表</div>
      <div class="lot-list" id="lotList">
        <div class="lot-empty">点击地图添加停车场</div>
      </div>
    </div>

    <!-- 操作 -->
    <div class="panel">
      <div class="panel-title">操作</div>
      <div class="action-btns">
        <button class="btn" onclick="undo()">撤销</button>
        <button class="btn" onclick="clearAll()">清空标注</button>
        <button class="btn" onclick="exportData()">导出数据</button>
        <button class="btn" onclick="document.getElementById('importFile').click()">导入数据</button>
        <input type="file" id="importFile" accept=".json" style="display:none;" onchange="importData(event)">
      </div>
    </div>

    <div class="shortcuts">
      <div class="shortcut-list">
        <kbd>V</kbd>移动 <kbd>T</kbd>文字 <kbd>P</kbd>停车场<br>
        <kbd>A</kbd>箭头 <kbd>F</kbd>导流(拖画) <kbd>G</kbd>指挥员 <kbd>E</kbd>删除<br>
        <kbd>O</kbd>出村口 <kbd>I</kbd>进村口<br>
        <kbd>Ctrl+Z</kbd>撤销
      </div>
    </div>
  </div>
</div>

<script src="https://webapi.amap.com/maps?v=1.4.15&key=26e69ba4a37c0b591917e2317bddbd12"></script>
<script>
const AMAP_KEY = '26e69ba4a37c0b591917e2317bddbd12';
let map = null;
let tool = 'parking';
let history = [];
let useServer = false;
let amapOverlays = {}; // key → AMap overlay
let trafficAnimations = [];

// 停车场颜色循环
const LOT_COLORS = ['#4caf50','#2196f3','#ff9800','#9c27b0','#00bcd4','#e91e63','#8bc34a','#ff5722'];
let lotCounter = 0;

// 箭头/导流线的第一个点
let arrowStart = null;
let arrowPreview = null;
let trafficDraft = null;
let trafficPreview = null;
let trafficPointerId = null;

// ==================== 地图初始化 ====================
function initMap() {
  var satellite = new AMap.TileLayer.Satellite();
  map = new AMap.Map('map', {
    zoom: 18,
    center: [116.307510, 23.912505],
    resizeEnable: true,
    layers: [satellite]
  });

  map.on('click', onMapClick);
  map.on('mousemove', onArrowMove); // 始终监听，内部判断工具类型

  // 实时显示鼠标坐标
  map.on('mousemove', function(e) {
    var lng = e.lnglat.getLng().toFixed(6);
    var lat = e.lnglat.getLat().toFixed(6);
    document.getElementById('coordBar').textContent = lng + ', ' + lat;
  });

  // 点击坐标栏复制
  document.getElementById('coordBar').addEventListener('click', function() {
    var text = this.textContent;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text);
      this.textContent = '已复制!';
      setTimeout(() => { this.textContent = text; }, 1000);
    }
  });

  setupTrafficDrawing();
}

// ==================== 数据 ====================
async function loadData() {
  try {
    const res = await fetch('/api/data');
    if (res.ok) {
      const data = await res.json();
      history = data.annotations || [];
      useServer = true;
      return;
    }
  } catch (e) {}
  history = JSON.parse(localStorage.getItem('traffic_planner_v2') || '[]');
}

async function saveHistory() {
  localStorage.setItem('traffic_planner_v2', JSON.stringify(history));
  if (useServer) {
    try {
      const parkingState = {};
      history.filter(h=>h.type==='parking').forEach(l => parkingState[l.name] = l.current || 0);
      await fetch('/api/data', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ annotations: history, parkingState })
      });
    } catch (e) { console.warn('保存到服务器失败', e); }
  }
  updateStats();
}

// ==================== 渲染 ====================
function renderAll() {
  // 清除所有 overlay
  trafficAnimations.forEach(id => clearInterval(id));
  trafficAnimations = [];
  Object.values(amapOverlays).forEach(o => { if (o && o.setMap) o.setMap(null); });
  amapOverlays = {};

  history.forEach((item, idx) => {
    renderOne(item, idx);
  });
  updateStats();
}

function renderOne(item, idx) {
  if (item.type === 'parking') renderParking(item, idx);
  else if (item.type === 'guard') renderGuard(item, idx);
  else if (item.type === 'villageExit') renderVillageGate(item, idx, 'exit');
  else if (item.type === 'villageEntry') renderVillageGate(item, idx, 'entry');
  else if (item.type === 'arrow') renderArrow(item, idx);
  else if (item.type === 'traffic') renderTraffic(item, idx);
  else if (item.type === 'text') renderText(item, idx);
}

function getVillageGateConfig(kind) {
  if (kind === 'exit') {
    return {
      color: '#ff7043',
      title: '出村口',
      subtitle: '出村方向',
      icon: `
        <svg viewBox="0 0 40 40" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 20h16"/>
          <path d="M18 12l8 8-8 8"/>
          <path d="M30 8v24"/>
        </svg>`
    };
  }
  return {
    color: '#4caf50',
    title: '进村口',
    subtitle: '进村方向',
    icon: `
      <svg viewBox="0 0 40 40" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M34 20H18"/>
        <path d="M22 12l-8 8 8 8"/>
        <path d="M10 8v24"/>
      </svg>`
  };
}

function renderVillageGate(item, idx, kind) {
  if (!item.lng || !item.lat) return;
  const cfg = getVillageGateConfig(kind);
  const content = `<div style="
    background:rgba(22,33,62,0.92); border:2px solid ${cfg.color};
    border-radius:10px; padding:6px 10px; color:#fff; font-size:12px;
    text-align:center; white-space:nowrap; font-family:-apple-system,sans-serif;
    min-width:92px;
  ">
    <div style="display:flex;align-items:center;justify-content:center;gap:6px;color:${cfg.color};">
      ${cfg.icon}
    </div>
    <div style="font-weight:700;font-size:13px;margin-top:2px;">${cfg.title}</div>
    <div style="font-size:10px;color:#8899aa;">${cfg.subtitle}</div>
    <div onclick="event.stopPropagation();" style="margin-top:3px;padding:2px 0;border-radius:3px;background:rgba(255,255,255,0.15);color:#ccc;font-size:9px;cursor:pointer;">
      拖动 / 删除
    </div>
  </div>`;

  const marker = new AMap.Marker({
    position: [item.lng, item.lat],
    content: content,
    offset: new AMap.Pixel(-46, -34),
    zIndex: 115,
    draggable: tool === 'move'
  });

  marker.on('dragend', e => {
    const pos = e.lnglat;
    item.lng = pos.lng;
    item.lat = pos.lat;
    saveHistory();
  });

  marker.on('click', e => {
    if (tool === 'eraser') {
      history.splice(idx, 1);
      saveHistory();
      renderAll();
    } else if (tool === 'arrow') {
      onMapClick({ lnglat: e.lnglat });
    }
  });

  marker.setMap(map);
  amapOverlays[`villageGate_${kind}_${idx}`] = marker;
}

function renderParking(item, idx) {
  if (!item.lng || !item.lat) return;
  const cur = item.current || 0, cap = item.cap || 0;
  const pct = cap > 0 ? cur / cap : 0;
  let borderColor, statusText;
  if (pct >= 1) { borderColor = '#f44336'; statusText = '已满'; }
  else if (pct >= 0.7) { borderColor = '#ff9800'; statusText = '紧张'; }
  else { borderColor = item.color || '#4caf50'; statusText = '充足'; }

  const content = `<div style="
    background:rgba(22,33,62,0.92); border:2px solid ${borderColor};
    border-radius:8px; padding:6px 10px; color:#fff; font-size:12px;

function renderArrow(item, idx) {
  if (!item.lng1 || !item.lat1) return;
  const path = [[item.lng1, item.lat1], [item.lng2, item.lat2]];
  const angle = getLineAngle(path[0], path[1]);
  const polyline = new AMap.Polyline({
    path: path,
    strokeColor: item.color || '#fff',
    strokeWeight: item.size || 3,
    strokeOpacity: 0.9,
    lineJoin: 'round'
  });
  polyline.setMap(map);
  amapOverlays['arrow_' + idx] = polyline;

  const arrowHead = new AMap.Marker({
    position: [item.lng2, item.lat2],
    content: arrowHeadContent(item.color || '#fff', angle + 180),
    offset: new AMap.Pixel(-10, -10),
    zIndex: 125
  });
  arrowHead.setMap(map);
  amapOverlays['arrowHead_' + idx] = arrowHead;

  // 点击删除 / 箭头穿透
  const removeArrow = () => {
    if (tool === 'eraser') {
      history.splice(idx, 1);
      saveHistory();
      renderAll();
    } else if (tool === 'arrow') {
      onMapClick({ lnglat: new AMap.LngLat(item.lng2, item.lat2) });
    }
  };
  polyline.on('click', removeArrow);
  arrowHead.on('click', removeArrow);
}

function renderTraffic(item, idx) {
  const path = getTrafficPath(item);
  if (path.length < 2) return;
  const polyline = new AMap.Polyline({
    path: path,
    strokeColor: '#ff9800',
    strokeWeight: (item.size || 3) + 2,
    strokeOpacity: 0.9,
    lineJoin: 'round',
    strokeStyle: 'solid'
  });
  polyline.setMap(map);
  amapOverlays['traffic_' + idx] = polyline;

  polyline.on('click', e => {
    if (tool === 'eraser') {
      history.splice(idx, 1);
      saveHistory();
      renderAll();
    } else if (tool === 'arrow') {
      onMapClick({ lnglat: e.lnglat });
    }
  });

  startTrafficFlow(path, 'trafficFlow_' + idx);
}

function getTrafficPath(item) {
  if (Array.isArray(item.points) && item.points.length) return item.points;
  if (item.lng1 && item.lat1 && item.lng2 && item.lat2) {
    return [[item.lng1, item.lat1], [item.lng2, item.lat2]];
  }
  return [];
}

function getPathPoint(path, progress) {
  let total = 0;
  const lengths = [];
  for (let i = 1; i < path.length; i++) {
    const a = path[i - 1], b = path[i];
    const len = Math.hypot(b[0] - a[0], b[1] - a[1]);
    lengths.push(len);
    total += len;
  }
  if (!total) return { lng: path[0][0], lat: path[0][1], angle: 0 };

  let dist = (progress % 1) * total;
  for (let i = 1; i < path.length; i++) {
    const len = lengths[i - 1];
    if (dist <= len) {
      const a = path[i - 1], b = path[i];
      const ratio = len ? dist / len : 0;
      return {
        lng: a[0] + (b[0] - a[0]) * ratio,
        lat: a[1] + (b[1] - a[1]) * ratio,
        angle: -Math.atan2(b[1] - a[1], b[0] - a[0]) * 180 / Math.PI
      };
    }
    dist -= len;
  }
  const last = path[path.length - 1];
  return { lng: last[0], lat: last[1], angle: 0 };
}

function getLineAngle(start, end) {
  return -Math.atan2(end[1] - start[1], end[0] - start[0]) * 180 / Math.PI;
}

function arrowHeadContent(color, angle) {
  return `<div style="
    width:20px;height:20px;display:flex;align-items:center;justify-content:center;
    color:${color};transform:rotate(${angle}deg);
    filter:drop-shadow(0 0 4px rgba(0,0,0,0.5));
  ">
    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" stroke="none">
      <path d="M4 12l10-7v5h6v4h-6v5z"></path>
    </svg>
  </div>`;
}

function trafficArrowContent(angle) {
  return `<div style="
    width:18px;height:18px;border-radius:50%;background:#ff9800;color:#fff;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 0 8px rgba(255,152,0,0.8);
    transform:rotate(${angle}deg);
  ">
    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 12h12"/>
      <path d="M13 6l6 6-6 6"/>
    </svg>
  </div>`;
}

function startTrafficFlow(path, keyPrefix) {
  const arrows = [0, 0.33, 0.66].map((offset, i) => {
    const marker = new AMap.Marker({
      content: trafficArrowContent(0),
      offset: new AMap.Pixel(-9, -9),
      zIndex: 130,
      bubble: true
    });
    marker.setMap(map);
    amapOverlays[keyPrefix + '_' + i] = marker;
    return { marker, offset };
  });

  let phase = 0;
  const update = () => {
    phase = (phase + 0.018) % 1;
    arrows.forEach(({ marker, offset }) => {
      const p = getPathPoint(path, phase + offset);
      marker.setPosition([p.lng, p.lat]);
      marker.setContent(trafficArrowContent(p.angle));
    });
  };
  update();
  trafficAnimations.push(setInterval(update, 80));
}

// ==================== 地图点击 ====================
function onMapClick(e) {
  const lng = e.lnglat.getLng();
  const lat = e.lnglat.getLat();

  if (tool === 'parking') {
    showParkingPopup(lng, lat);
  } else if (tool === 'guard') {
    showGuardPopup(lng, lat);
  } else if (tool === 'villageExit') {
    history.push({ type: 'villageExit', lng, lat });
    saveHistory();
    renderAll();
  } else if (tool === 'villageEntry') {
    history.push({ type: 'villageEntry', lng, lat });
    saveHistory();
    renderAll();
  } else if (tool === 'text') {
    showTextPopup(lng, lat);
  } else if (tool === 'arrow') {
    if (!arrowStart) {
      arrowStart = { lng, lat };
      // 不画起点标记，避免拦截第二次点击
      // 提示状态
      document.getElementById('coordBar').textContent = '起点已设定，点击终点完成';
    } else {
      // 完成箭头/导流线
      const color = document.getElementById('colorPicker').value;
      const size = 3;
      history.push({ type: 'arrow', lng1: arrowStart.lng, lat1: arrowStart.lat, lng2: lng, lat2: lat, color, size });
      if (arrowPreview) { arrowPreview.setMap(null); arrowPreview = null; }
      arrowStart = null;
      saveHistory();
      renderAll();
    }
  }
}

// 箭头预览线
function setupArrowPreview() {
  if (arrowStart) {
    map.on('mousemove', onArrowMove);
  }
}

function onArrowMove(e) {
  if (!arrowStart || tool !== 'arrow') return;
  const lng = e.lnglat.getLng(), lat = e.lnglat.getLat();
  if (arrowPreview) arrowPreview.setMap(null);
  arrowPreview = new AMap.Polyline({
    path: [[arrowStart.lng, arrowStart.lat], [lng, lat]],
    strokeColor: document.getElementById('colorPicker').value || '#fff',
    strokeWeight: 3,
    strokeOpacity: 0.6,
    strokeStyle: 'dashed',
    bubble: true,
    clickable: false
  });
  arrowPreview.setMap(map);
}

function clearArrowState() {
  arrowStart = null;
  if (arrowPreview) { arrowPreview.setMap(null); arrowPreview = null; }
}

function clearTrafficState() {
  trafficDraft = null;
  trafficPointerId = null;
  if (trafficPreview) { trafficPreview.setMap(null); trafficPreview = null; }
}

function setupTrafficDrawing() {
  const mapEl = document.getElementById('map');
  const toMapPoint = (ev) => {
    const rect = mapEl.getBoundingClientRect();
    const x = ev.clientX - rect.left;
    const y = ev.clientY - rect.top;
    return { pixel: new AMap.Pixel(x, y), lnglat: map.containerToLngLat(new AMap.Pixel(x, y)) };
  };

  mapEl.addEventListener('pointerdown', ev => {
    if (tool !== 'traffic') return;
    const p = toMapPoint(ev);
    ev.preventDefault();
    ev.stopPropagation();
    mapEl.setPointerCapture(ev.pointerId);
    trafficPointerId = ev.pointerId;
    clearArrowState();
    clearTrafficState();
    trafficDraft = {
      points: [[p.lnglat.getLng(), p.lnglat.getLat()]],
      lastPixel: p.pixel
    };
    trafficPreview = new AMap.Polyline({
      path: trafficDraft.points,
      strokeColor: '#ff9800',
      strokeWeight: 5,
      strokeOpacity: 0.75,
      strokeStyle: 'dashed',
      bubble: false,
      clickable: false
    });
    trafficPreview.setMap(map);
    document.getElementById('coordBar').textContent = '拖动画出导流线，松开完成';
  });

  mapEl.addEventListener('pointermove', ev => {
    if (tool !== 'traffic' || !trafficDraft || trafficPointerId !== ev.pointerId) return;
    const p = toMapPoint(ev);
    const dx = p.pixel.getX() - trafficDraft.lastPixel.getX();
    const dy = p.pixel.getY() - trafficDraft.lastPixel.getY();
    if (Math.hypot(dx, dy) < 4) return;
    trafficDraft.points.push([p.lnglat.getLng(), p.lnglat.getLat()]);
    trafficDraft.lastPixel = p.pixel;
    if (trafficPreview && typeof trafficPreview.setPath === 'function') {
      trafficPreview.setPath(trafficDraft.points);
    }
  });

  const finishTraffic = ev => {
    if (tool !== 'traffic' || !trafficDraft || trafficPointerId !== ev.pointerId) return;
    ev.preventDefault();
    ev.stopPropagation();
    const pts = trafficDraft.points.slice();
    try { mapEl.releasePointerCapture(ev.pointerId); } catch (err) {}
    if (pts.length >= 2) {
      history.push({ type: 'traffic', points: pts, size: 3 });
      saveHistory();
      renderAll();
    } else {
      clearTrafficState();
    }
    clearTrafficState();
  };

  mapEl.addEventListener('pointerup', finishTraffic);
  mapEl.addEventListener('pointercancel', finishTraffic);
  mapEl.addEventListener('pointerleave', ev => {
    if (tool === 'traffic' && trafficDraft && trafficPointerId === ev.pointerId) {
      finishTraffic(ev);
    }
  });
}

// ==================== 弹窗 ====================
let popupCallback = null;
let pendingData = {};

function showPopup(title, fields, data, callback) {
  const overlay = document.getElementById('popupOverlay');
  document.getElementById('popupTitle').textContent = title;
  const fieldsEl = document.getElementById('popupFields');
  fieldsEl.innerHTML = fields.map(f =>
    `<label>${f.label}</label><input type="${f.type||'text'}" id="pop_${f.key}" value="${f.value||''}" placeholder="${f.placeholder||''}" ${f.min?'min="'+f.min+'"':''} ${f.max?'max="'+f.max+'"':''}>`
  ).join('');
  pendingData = data;
  popupCallback = callback;
  overlay.style.display = 'flex';
  setTimeout(() => {
    const first = fieldsEl.querySelector('input');
    if (first) first.focus();
  }, 100);
}

function closePopup() {
  document.getElementById('popupOverlay').style.display = 'none';
  popupCallback = null;
  pendingData = {};
}

function confirmPopup() {
  const inputs = document.getElementById('popupFields').querySelectorAll('input');
  const values = {};
  inputs.forEach(inp => {
    const key = inp.id.replace('pop_', '');
    values[key] = inp.type === 'number' ? parseInt(inp.value) || 0 : inp.value.trim();
  });
  if (popupCallback) popupCallback(values, pendingData);
  closePopup();
}

// 弹窗回车确认
document.getElementById('popupFields').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); confirmPopup(); }
  if (e.key === 'Escape') closePopup();
});

// ==================== 编辑已有标注 ====================
function editParking(idx) {
  const item = history[idx];
  if (!item) return;
  showPopup('编辑停车场', [
    { key: 'name', label: '停车场名称', value: item.name },
    { key: 'cap', label: '车位数量', type: 'number', value: item.cap, min: 1 }
  ], {}, (vals) => {
    if (vals.name) item.name = vals.name;
    if (vals.cap > 0) item.cap = vals.cap;
    if (item.current > item.cap) item.current = item.cap;
    saveHistory();
    renderAll();
  });
}

function editGuard(idx) {
  const item = history[idx];
  if (!item) return;
  showPopup('编辑指挥员', [
    { key: 'name', label: '指挥员姓名', value: item.name || '' }
  ], {}, (vals) => {
    if (vals.name) item.name = vals.name;
    saveHistory();
    renderAll();
  });
}

function showParkingPopup(lng, lat) {
  lotCounter++;
  const autoName = String.fromCharCode(64 + lotCounter) + '区';
  showPopup('添加停车场', [
    { key: 'name', label: '停车场名称', value: autoName, placeholder: '如：A区' },
    { key: 'cap', label: '车位数量', type: 'number', placeholder: '如：30', min: 1 }
  ], { lng, lat }, (vals, data) => {
    if (!vals.name || vals.cap <= 0) return;
    const color = LOT_COLORS[(history.filter(h=>h.type==='parking').length) % LOT_COLORS.length];
    history.push({ type: 'parking', name: vals.name, cap: vals.cap, current: 0, color, lng: data.lng, lat: data.lat });
    saveHistory();
    renderAll();
  });
}

function showGuardPopup(lng, lat) {
  showPopup('添加指挥员', [
    { key: 'name', label: '指挥员姓名', placeholder: '如：胡大明' }
  ], { lng, lat }, (vals, data) => {
    if (!vals.name) return;
    history.push({ type: 'guard', name: vals.name, lng: data.lng, lat: data.lat });
    saveHistory();
    renderAll();
  });

function showTextPopup(lng, lat) {
  showPopup('添加文字', [
    { key: 'text', label: '文字内容', placeholder: '输入文字' }
  ], { lng, lat }, (vals, data) => {

    });

// ==================== 工具切换 ====================
function setTool(t) {
  tool = t;
  clearArrowState();
  clearTrafficState();
  document.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));
  const btn = document.getElementById('btn'+t.charAt(0).toUpperCase()+t.slice(1));
  if (btn) btn.classList.add('active');

  document.getElementById('fontGroup').style.display = t==='text'?'flex':'none';

  // 设置地图光标
  const mapDiv = document.getElementById('map');
  if (t === 'move') mapDiv.style.cursor = 'default';
  else if (t === 'eraser') mapDiv.style.cursor = 'not-allowed';
  else if (t === 'traffic') mapDiv.style.cursor = 'crosshair';
  else mapDiv.style.cursor = 'crosshair';
  if (map && typeof map.setStatus === 'function') {
    map.setStatus({ dragEnable: t !== 'traffic' });
  }

  // 只更新 draggable 状态，不重新渲染
  const draggable = (t === 'move');
  Object.values(amapOverlays).forEach(o => {
    if (o && typeof o.setDraggable === 'function') o.setDraggable(draggable);
  });
}

// ==================== 统计 ====================
function updateStats() {
  const lots = history.filter(h=>h.type==='parking');
  const totalCap = lots.reduce((s,l)=>s+l.cap,0);
  const totalParked = lots.reduce((s,l)=>s+(l.current||0),0);
  const totalFree = totalCap - totalParked;
  const target = 150;

  document.getElementById('totalSlots').textContent = totalCap;
  document.getElementById('totalLots').textContent = lots.length;
  document.getElementById('totalParked').textContent = totalParked;
  document.getElementById('totalFree').textContent = totalFree;
  document.getElementById('statsBadge').textContent = totalParked+'/'+totalCap;

  const planPct = Math.min(100, Math.round(totalCap/target*100));
  document.getElementById('progressText').textContent = planPct+'%';
  const fillEl = document.getElementById('progressFill');
  fillEl.style.width = planPct+'%';
  fillEl.style.background = totalCap>=target?'#4caf50':totalCap>=target*0.7?'#ff9800':'#f44336';

  document.getElementById('totalParked').style.color = totalParked > 0 ? '#ff9800' : '#556';
  document.getElementById('totalFree').style.color = totalFree > 0 ? '#4caf50' : '#f44336';

  // 停车场列表
  const listEl = document.getElementById('lotList');
  if(!lots.length) {
    listEl.innerHTML='<div class="lot-empty">点击地图添加停车场</div>';
  } else {
    listEl.innerHTML = lots.map(l=>{
      const idx = history.indexOf(l);
      const cur = l.current || 0;
      const full = cur >= l.cap;
      return `<div class="lot-item">
        <span class="lot-color" style="background:${full?'#f44336':l.color}"></span>
        <span class="lot-name">${l.name}${full?' (已满)':''}</span>
        <span style="display:flex;align-items:center;gap:2px;">
          <span class="lot-btn" onclick="changeParking(${idx},-1)">−</span>
          <span class="lot-cap ${full?'full':'ok'}">${cur}/${l.cap}</span>
          <span class="lot-btn" onclick="changeParking(${idx},1)">+</span>
        </span>
        <span class="lot-del" onclick="deleteLot(${idx})">×</span>
      </div>`;
    }).join('');
  }
}

function changeParking(idx, delta) {
  const item = history[idx];
  if (!item) return;
  const cur = item.current || 0;
  item.current = Math.max(0, Math.min(cur + delta, item.cap));
  saveHistory();
  renderAll();
}

function deleteLot(idx) {
  history.splice(idx, 1);
  saveHistory();
  renderAll();
}

function undo() {
  if (!history.length) return;
  history.pop();
  saveHistory();
  renderAll();
}

function clearAll() {
  if (!history.length) return;
  if (confirm('确定清空所有标注吗？')) {
    history = [];
    lotCounter = 0;
    saveHistory();
    renderAll();
  }
}

function exportData() {
  const data = { annotations: history, exportTime: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '交通规划数据_' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      const annotations = data.annotations || data;
      if (!Array.isArray(annotations)) throw new Error('格式错误');
      if (!confirm('导入将覆盖当前所有数据，确定继续吗？')) return;
      history = annotations;
      lotCounter = history.filter(h => h.type === 'parking').length;
      saveHistory();
      renderAll();
      alert('导入成功！共 ' + history.length + ' 条标注');
    } catch (err) {
      alert('导入失败：文件格式不正确');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ==================== 属性控件 ====================
document.getElementById('colorPicker').oninput = function(){ document.getElementById('colorHex').textContent=this.value; };
document.getElementById('fontSize').oninput = function(){ document.getElementById('fontSizeVal').textContent=this.value; };

// ==================== 快捷键 ====================
document.addEventListener('keydown', e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  if(e.ctrlKey&&e.key==='z'){e.preventDefault();undo();}
  if(e.key==='v'||e.key==='V')setTool('move');
  if(e.key==='t'||e.key==='T')setTool('text');
  if(e.key==='a'||e.key==='A')setTool('arrow');
  if(e.key==='e'||e.key==='E')setTool('eraser');
  if(e.key==='p'||e.key==='P')setTool('parking');
  if(e.key==='f'||e.key==='F')setTool('traffic');
  if(e.key==='g'||e.key==='G')setTool('guard');
  if(e.key==='o'||e.key==='O')setTool('villageExit');
  if(e.key==='i'||e.key==='I')setTool('villageEntry');
});

// ==================== 登录 ====================
function checkLogin() {
  const pwd = document.getElementById('loginPwd').value;
  if (pwd === '112233') {
    sessionStorage.setItem('admin_auth', '1');
    document.getElementById('loginMask').style.display = 'none';
    initAndLoad();
  } else {
    document.getElementById('loginErr').style.display = 'block';
    document.getElementById('loginPwd').value = '';
    document.getElementById('loginPwd').focus();
  }
}
document.getElementById('loginPwd').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkLogin();
});

async function initAndLoad() {
  await loadData();
  renderAll();

  // 自动调整视野
  const points = history.filter(a => a.lng && a.lat).map(a => [a.lng, a.lat]);
  const linePts = history.flatMap(a => {
    if (a.type === 'arrow') return [[a.lng1, a.lat1], [a.lng2, a.lat2]];
    if (a.type === 'traffic') return getTrafficPath(a);
    return [];
  });
  const allPts = [...points, ...linePts].filter(p => p[0] && p[1]);

  if (allPts.length > 1) {
    map.setFitView();
  }
}

if (sessionStorage.getItem('admin_auth') === '1') {
  document.getElementById('loginMask').style.display = 'none';
  initMap();
  initAndLoad();
} else {
  initMap();
}
</script>
