<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>胡氏清念宗祠重光庆典交通疏导（停车）系统</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body { background: #1a1a2e; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; display: flex; flex-direction: column; }

.header {
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  padding: 6px 12px; text-align: center;
  border-bottom: 1px solid #e94560; position: relative; flex-shrink: 0;
}
.header h1 { color: #f0e6d3; font-size: 13px; letter-spacing: 1px; }
.header .refresh-info {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  color: #445; font-size: 9px;
}

.map-container { flex: 1; position: relative; }

/* 数据悬浮面板 */
.data-panel {
  position: absolute; top: 8px; left: 8px; z-index: 100;
  background: rgba(22,33,62,0.9); border-radius: 6px;
  backdrop-filter: blur(4px); padding: 6px 10px; max-width: 200px;
}
.overview {
  display: flex; gap: 0;
  border-bottom: 1px solid rgba(15,52,96,0.5); margin-bottom: 3px; padding-bottom: 3px;
}
.overview-card {
  padding: 1px 8px; text-align: center;
  border-right: 1px solid rgba(15,52,96,0.5);
}
.overview-card:last-child { border-right: none; }
.overview-card .num { font-size: 12px; font-weight: 700; }
.overview-card .label { font-size: 7px; color: #667; }

.lot-panel {
  font-size: 10px; color: #c0c8d4; line-height: 1.7;
}
.lot-panel .lot-row { display: flex; gap: 3px; align-items: center; }
.lot-panel .lot-row .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.lot-panel .lot-row .lname { font-weight: 600; color: #f0e6d3; }
.lot-panel .lot-row .lfree { color: #4caf50; font-weight: 600; }
.lot-panel .lot-row .lfull { color: #f44336; font-weight: 600; }
.lot-panel .lot-row .lpark { color: #8899aa; }

/* 底部提示 */
.notice-bar {
  background: #16213e; padding: 6px 12px; text-align: center;
  color: #8899aa; font-size: 10px; line-height: 1.5; flex-shrink: 0;
  border-top: 1px solid #0f3460;
}
</style>
</head>
<body>

<div class="header">
  <h1>胡氏清念宗祠重光庆典交通疏导（停车）系统</h1>
  <div class="refresh-info" id="refreshInfo">加载中...</div>
</div>

<div class="map-container">
  <div id="map" style="width:100%;height:100%;"></div>
  <div class="data-panel">
    <div class="overview">
      <div class="overview-card">
        <div class="num" id="totalCap" style="color:#c0c8d4;">-</div>
        <div class="label">总车位</div>
      </div>
      <div class="overview-card">
        <div class="num" id="totalParked" style="color:#ff9800;">-</div>
        <div class="label">已停</div>
      </div>
      <div class="overview-card">
        <div class="num" id="totalFree" style="color:#4caf50;">-</div>
        <div class="label">剩余</div>
      </div>
    </div>
    <div class="lot-panel" id="lotPanel">
      <div style="color:#556;font-size:9px;">加载中...</div>
    </div>
  </div>
</div>

<div class="notice-bar">
  各位来宾，由于当天来车众多，为了确保交通顺畅，请大家按照交通指挥员指导进行停车。如有不便请多原谅！
</div>

<script src="https://webapi.amap.com/maps?v=1.4.15&key=26e69ba4a37c0b591917e2317bddbd12"></script>
<script>
const REFRESH_INTERVAL = 5000;
let map = null;
let markers = {};
let lastUpdate = 0;

function initMap() {
  var satellite = new AMap.TileLayer.Satellite();
  map = new AMap.Map('map', {
    zoom: 18,
    center: [116.307510, 23.912505],
    resizeEnable: true,
    layers: [satellite]
  });
}

async function fetchData() {
  try {
    const res = await fetch('/api/data');
    if (!res.ok) throw new Error('err');
    const data = await res.json();
    renderData(data);
    lastUpdate = Date.now();
    document.getElementById('refreshInfo').textContent = '已更新';
  } catch (e) {
    document.getElementById('refreshInfo').textContent = '连接失败';
  }
}

function renderData(data) {
  const lots = (data.annotations || []).filter(a => a.type === 'parking');
  const totalCap = lots.reduce((s, l) => s + (l.cap || 0), 0);
  const totalParked = lots.reduce((s, l) => s + (l.current || 0), 0);
  const totalFree = totalCap - totalParked;

  document.getElementById('totalCap').textContent = totalCap;
  document.getElementById('totalParked').textContent = totalParked;
  document.getElementById('totalFree').textContent = totalFree;
  document.getElementById('totalFree').style.color = totalFree > 0 ? '#4caf50' : '#f44336';

  // 列表面板
  if (!lots.length) {
    document.getElementById('lotPanel').innerHTML = '<div style="color:#556;font-size:9px;">暂无停车数据</div>';
  } else {
    document.getElementById('lotPanel').innerHTML = lots.map(l => {
      const cur = l.current || 0, cap = l.cap || 0, free = cap - cur;
      const pct = cap > 0 ? cur / cap : 0;
      const dotColor = pct >= 1 ? '#f44336' : pct >= 0.7 ? '#ff9800' : '#4caf50';
      return `<div class="lot-row">
        <span class="dot" style="background:${dotColor}"></span>
        <span class="lname">${l.name}</span>
        <span class="lpark">停${cur}</span>
        <span class="${free>0?'lfree':'lfull'}">${free>0?'空'+free:'已满'}</span>
      </div>`;
    }).join('');
  }

  // 更新地图标记
  updateMapMarkers(lots, data.annotations || []);
}

function updateMapMarkers(lots, allAnnotations) {
  if (!map) return;

  // 先清除所有旧标记，防止删除/改名后残留
  Object.values(markers).forEach(m => { if (m && m.setMap) m.setMap(null); });
  markers = {};

  // 收集所有有坐标的标注
  const points = [];

  lots.forEach(l => {
    if (!l.lng || !l.lat) return; // 需要在 admin 中设置经纬度
    const cur = l.current || 0, cap = l.cap || 0;
    const free = cap - cur;
    const pct = cap > 0 ? cur / cap : 0;

    const key = 'lot_' + l.name;
    if (markers[key]) map.remove(markers[key]);

    // 自定义标记内容
    let statusColor, statusText;
    if (pct >= 1) { statusColor = '#f44336'; statusText = '已满'; }
    else if (pct >= 0.7) { statusColor = '#ff9800'; statusText = '紧张'; }
    else { statusColor = l.color || '#4caf50'; statusText = '充足'; }

    const content = `<div style="
      background:rgba(22,33,62,0.9); border:2px solid ${statusColor};
      border-radius:8px; padding:4px 8px; color:#fff; font-size:12px;
      text-align:center; white-space:nowrap; font-family:-apple-system,sans-serif;
    ">
      <div style="font-weight:700;font-size:13px;">${l.name}</div>
      <div style="font-size:10px;color:${statusColor};font-weight:600;">${statusText} · 空${free}</div>
      <div style="font-size:9px;color:#8899aa;">${cur}/${cap}台</div>
      <div onclick="event.stopPropagation();window.open('https://uri.amap.com/navigation?to=${l.lng},${l.lat},${l.name}&mode=car','_blank')"
        style="margin-top:3px;padding:2px 0;border-radius:3px;background:${statusColor};color:#fff;font-size:9px;cursor:pointer;font-weight:600;">
        点击导航到此
      </div>
    </div>`;

    const marker = new AMap.Marker({
      position: [l.lng, l.lat],
      content: content,
      offset: new AMap.Pixel(-40, -30),
      zIndex: 120
    });
    marker.setMap(map);
    markers[key] = marker;
    points.push([l.lng, l.lat]);
  });

  // 指挥员
  allAnnotations.filter(a => a.type === 'guard' && a.lng && a.lat).forEach(g => {
    const key = 'guard_' + (g.name || '');
    if (markers[key]) map.remove(markers[key]);
    const name = g.name || '指挥员';
    const content = `<div style="text-align:center;white-space:nowrap;">
      <div style="
        background:rgba(0,188,212,0.9);border:2px solid #fff;
        border-radius:50%;width:36px;height:36px;
        display:flex;align-items:center;justify-content:center;
        box-shadow:0 2px 8px rgba(0,0,0,0.4);margin:0 auto;
      ">
        <svg viewBox="0 0 32 32" width="26" height="26" fill="none">
          <rect x="11" y="2" width="10" height="3" rx="1.5" fill="#fff"/>
          <rect x="13.5" y="1" width="5" height="2" rx="1" fill="#fff"/>
          <circle cx="16" cy="9" r="3.5" fill="#fff"/>
          <rect x="11.5" y="13" width="9" height="3" rx="1" fill="#fff"/>
          <rect x="12" y="16" width="8" height="8" rx="1.5" fill="#fff"/>
          <rect x="8" y="13" width="4" height="2.5" rx="1" fill="#fff" transform="rotate(-30 10 14)"/>
          <rect x="20" y="11" width="4" height="2.5" rx="1" fill="#fff" transform="rotate(25 22 12)"/>
          <rect x="12" y="24" width="3" height="5" rx="1" fill="#fff"/>
          <rect x="17" y="24" width="3" height="5" rx="1" fill="#fff"/>
        </svg>
      </div>
      <div style="color:#fff;font-size:10px;font-weight:600;margin-top:2px;text-shadow:0 1px 3px rgba(0,0,0,0.8);">${name}</div>
    </div>`;
    const marker = new AMap.Marker({
      position: [g.lng, g.lat],
      content: content,
      offset: new AMap.Pixel(-50, -14),
      zIndex: 110
    });
    marker.setMap(map);
    markers[key] = marker;
    points.push([g.lng, g.lat]);
  });

  // 文字标注
  allAnnotations.filter(a => a.type === 'text' && a.lng && a.lat).forEach((t, i) => {
    const key = 'text_' + i;
    if (markers[key]) map.remove(markers[key]);
    const content = `<div style="
      color:${t.color || '#fff'}; font-size:${t.fontSize || 16}px;
      font-weight:700; font-family:-apple-system,sans-serif;
      text-shadow: 0 0 4px rgba(0,0,0,0.8), 0 0 8px rgba(0,0,0,0.5);
      white-space:nowrap;
    ">${t.text}</div>`;
    const marker = new AMap.Marker({
      position: [t.lng, t.lat],
      content: content,
      offset: new AMap.Pixel(0, 0),
      zIndex: 100
    });
    marker.setMap(map);
    markers[key] = marker;
    points.push([t.lng, t.lat]);
  });

  // 箭头
  allAnnotations.filter(a => a.type === 'arrow' && a.lng1).forEach((a, i) => {
    const key = 'arrow_' + i;
    if (markers[key]) map.remove(markers[key]);
    const polyline = new AMap.Polyline({
      path: [[a.lng1, a.lat1], [a.lng2, a.lat2]],
      strokeColor: a.color || '#fff',
      strokeWeight: a.size || 3,
      strokeOpacity: 0.9,
      lineJoin: 'round'
    });
    polyline.setMap(map);
    markers[key] = polyline;
  });

  // 导流线
  allAnnotations.filter(a => a.type === 'traffic' && a.lng1).forEach((a, i) => {
    const key = 'traffic_' + i;
    if (markers[key]) map.remove(markers[key]);
    const polyline = new AMap.Polyline({
      path: [[a.lng1, a.lat1], [a.lng2, a.lat2]],
      strokeColor: '#ff9800',
      strokeWeight: (a.size || 3) + 2,
      strokeOpacity: 0.9,
      lineJoin: 'round'
    });
    polyline.setMap(map);
    markers[key] = polyline;
  });

  // 自动调整视野
  if (points.length > 0) {
    if (points.length === 1) {
      map.setCenter(points[0]);
    } else {
      map.setFitView(Object.values(markers));
    }
  }
}

// 初始化
initMap();
fetchData();
setInterval(fetchData, REFRESH_INTERVAL);
</script>
</body>
</html>
